name: '${WORKSPACE}'

services:
  gzctf:
    image: dimasmaualana/gzctf:develop
    restart: always
    environment:
      - "LC_ALL=en_US.UTF-8"
      # First-boot admin seed. PrelaunchHelper only creates the 'Admin'
      # user when this is set; ignored on subsequent boots if the user
      # already exists. Generated by scripts/wizard.sh, persisted in .env.
      - "ADMIN_PASSWORD=${ADMIN_PASSWORD}"
      # A&D SSH config (InternalSecret / PublicHost / PublicPort) lives in
      # appsettings.json under "Ad": { "Ssh": ... }, next to "Ad": { "Vpn" }.
      # init-config.sh generates the secret once and writes it BOTH there (for gzctf)
      # and to .env as AD_SSH_INTERNAL_SECRET (for the ssh-jump sidecar) — one value,
      # two places, can't diverge. So no Ad__Ssh__* env vars are needed here.
    # Honeypot listener ports. Each port matches an entry in
    # appsettings.json -> HoneypotConfig.Ports. Drop ports here that you
    # do not want exposed (or disable per-entry in appsettings.json).
    ports:
      - "2222:2222"   # ssh honeypot
      - "3306:3306"   # mysql honeypot
      - "5432:5432"   # postgres honeypot
      - "6379:6379"   # redis honeypot
      - "11211:11211" # memcached honeypot
      - "27017:27017" # mongo honeypot
      - "9200:9200"   # elasticsearch honeypot
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    volumes:
      - "gzctf-files:/app/files"
      - "./appsettings.json:/app/appsettings.json:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"
      # Shared with the wireguard sidecar. gzctf's AdWireGuardSyncService
      # writes wg0.conf here; the sidecar's inotify loop reads it. Omit the
      # mount + the sidecar service entirely if you don't need A&D / VPN.
      - "wg-config:/wg-config"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "sh", "-c", "wget -q --spider --timeout=5 http://localhost:8080/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      traefik:
      app_net:
      # PlatformProxy mode (appsettings.json -> ContainerProvider.PortMappingType)
      # requires gzctf to reach challenge container IPs. The "challenges" network
      # is the same name as ContainerProvider.DockerConfig.ChallengeNetwork; it is
      # declared external below because gzcli also creates/uses it for the
      # challenge containers it spawns via /var/run/docker.sock.
      challenges:
    labels:
      - "traefik.enable=true"
      # docker network to use
      - "traefik.docker.network=traefik"

      # Service ports
      - "traefik.http.services.gzctf-${WORKSPACE}-https.loadbalancer.server.port=8080"

      # HTTPS router
      - "traefik.http.routers.gzctf-${WORKSPACE}-https.rule=Host(`${PUBLIC_ENTRY}`)"
      - "traefik.http.routers.gzctf-${WORKSPACE}-https.entrypoints=websecure"
      - "traefik.http.routers.gzctf-${WORKSPACE}-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gzctf-${WORKSPACE}-https.service=gzctf-${WORKSPACE}-https"

  db:
    image: postgres:17
    restart: always
    environment:
      # Sourced from .env (wizard.sh / init-config.sh generate a strong
      # random password and persist it there). Falls back to "postgres"
      # for legacy deploys whose .env predates the POSTGRES_PASSWORD
      # field — those should rotate via ALTER USER inside the running
      # db container, then update .env + appsettings.json's
      # ConnectionStrings.Database.
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}"
    volumes:
      - "postgres-data:/var/lib/postgresql/data"
    networks:
      app_net:
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:alpine
    restart: always
    networks:
      app_net:
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Per-team WireGuard VPN endpoint for A&D challenges. AdWireGuardSyncService
  # (inside gzctf) renders wg0.conf into the shared volume; this sidecar's
  # inotify loop applies it with `wg syncconf`. AdVpnTopology (also in gzctf)
  # uses the docker socket to attach this container to challenge networks at
  # runtime, so VPN clients get a kernel route to challenge container IPs
  # WITHOUT bridging to the gzctf control plane (postgres + redis stay on
  # app_net; the sidecar sits on a lonely wg-bootstrap bridge instead).
  #
  # Remove this whole service + the gzctf wg-config volume mount + the
  # wg-bootstrap network + the wg-config volume below if you don't need A&D.
  wireguard:
    build:
      context: ../wireguard
    restart: always
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
      net.ipv4.ip_forward: 1
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # UDP 51820 is the WireGuard handshake port. Open in your cloud
      # firewall + DNS-resolve PUBLIC_ENTRY → this host. Players' .conf
      # files use Endpoint = ${PUBLIC_ENTRY}:51820 by default.
      - "51820:51820/udp"
    volumes:
      - "wg-config:/config"
    networks:
      - wg-bootstrap
    depends_on:
      - gzctf

  # SSH jump host for A&D — players `ssh <challenge-id>@${PUBLIC_ENTRY} -p 22022` to land a
  # shell inside their OWN challenge container. Keyed auth: the username is the challenge id,
  # the SSH public key (registered via the in-game Toolkit) identifies the team. The bastion
  # has no shell accounts — it proxies stdio to `docker exec` in the resolved container
  # through gzctf's internal endpoints, guarded by the shared INTERNAL_SECRET. Remove this
  # whole service (and the gzctf Ad.Ssh appsettings block) if you don't need A&D SSH.
  ssh-jump:
    build:
      context: ../ssh-jump
    restart: always
    environment:
      # Internal control-plane URL — stays on app_net (same network as gzctf/db/cache).
      - GZCTF_URL=http://gzctf:8080
      # MUST equal gzctf's Ad:Ssh:InternalSecret (in appsettings.json) — init-config
      # writes both from the same ${AD_SSH_INTERNAL_SECRET}.
      - INTERNAL_SECRET=${AD_SSH_INTERNAL_SECRET}
    ports:
      # Host AD_SSH_PUBLIC_PORT (default 22022) -> 22 inside. Open it in your cloud firewall.
      - "${AD_SSH_PUBLIC_PORT:-22022}:22"
    depends_on:
      - gzctf
    networks:
      app_net:

volumes:
  gzctf-files:
  postgres-data:
  # Shared between gzctf (writes wg0.conf + reads server pubkey) and the
  # wireguard sidecar (writes server keypair on first boot + reloads wg0
  # on file change).
  wg-config:


networks:
  traefik:
    external: true
  app_net:
    driver: bridge
  # Lonely bootstrap bridge for the wireguard sidecar — nothing else lands
  # on it. Compose just needs *some* network for the sidecar to attach
  # so the UDP 51820 port mapping works; AdVpnTopology (gzctf) attaches
  # the sidecar to the platform's challenge networks at runtime.
  wg-bootstrap:
    driver: bridge
    # No explicit subnet — let docker pick a free one. Pinning
    # 172.28.0.0/16 used to cause 'pool overlaps' errors on hosts
    # where that subnet was already allocated by a previous run or
    # an unrelated docker network.
  # The shared challenges network is created externally (by gzcli or manually
  # via `docker network create challenges`) so gzctf can connect to challenge
  # container IPs when PortMappingType=PlatformProxy.
  challenges:
    external: true
