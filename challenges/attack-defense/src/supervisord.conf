# supervisord runs as PID 1 so the service runs as a CHILD: it can crash or be
# restarted in place WITHOUT the container exiting, which is what lets an
# operator "restart" the box while keeping the team's filesystem changes
# (patches). Recreating the pod/container instead ("Reset") reverts to this
# image. `supervisorctl restart svc` bounces just the service.
[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[unix_http_server]
file=/run/supervisor.sock

[supervisorctl]
serverurl=unix:///run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:svc]
command=python3 /service.py
autostart=true
autorestart=true
startretries=1000000
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
